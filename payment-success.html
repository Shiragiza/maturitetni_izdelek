            <h2 class="form-title" style="color: green;">Plačilo uspešno!</h2>

            <p style="margin: 20px 0;">Sedaj imate dostop do vseh video posnetkov.</p>

    <script src="JAVAScript/sidebar_and_topbar.js"></script>
    <script src="JAVAScript/JS_login_and_regictracija.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/api';

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                token: params.get('token'),
                PayerID: params.get('PayerID')
            };
        }

        async function capturePayPalPayment() {
            const {
                token,
                PayerID
            } = getUrlParams();
            if (token && PayerID) {
                try {
                    await fetch(`${API_URL}/payment/paypal/capture-order`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        credentials: 'include',
                        body: JSON.stringify({
                            orderId: token
                        })
                    });
                } catch (e) {
                    console.error('Error capturing PayPal payment:', e);
                }
            }
        }

        async function checkAndRedirect() {
            await capturePayPalPayment();

            try {
                await fetch(`${API_URL}/auth/refresh`, {
                    credentials: 'include'
                });

                const response = await fetch(`${API_URL}/auth/me`, {
                    credentials: 'include'
                });
                const result = await response.json();

                if (!result.user) {
                    window.location.href = 'login.html';
                    return;
                }

                if (result.user.has_access) {
                    window.location.href = 'posnetki.html';
                } else {
                    window.location.href = 'placilo.html';
                }
            } catch (e) {
                window.location.href = 'login.html';
            }
        }

        document.addEventListener('DOMContentLoaded', async() => {
            const user = await checkAuth();
            await updateAuthUI(user);
            await checkAndRedirect();
        });
    </script>
