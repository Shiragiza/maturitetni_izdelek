        <button class="register-btn" onclick="window.location.href='registracija.html'">Registracija</button>
        <button class="login-btn" onclick="window.location.href='login.html'">Login</button>
    </div>
</header>

    <div class="auth-buttons">
        <button class="register-btn" onclick="window.location.href='registracija.html'">Registracija</button>
        <button class="login-btn" onclick="window.location.href='login.html'">Login</button>
    </div>

    <div class="registration-container">
        <div class="registration-form">

            <h2 class="form-title">Registracija</h2>
            <form id="registrationForm">
                <div class="form-group">
                    <label for="first_name">Ime</label>
                    <input type="text" id="first_name" name="first_name" required>
                </div>

                <div class="form-group">
                    <label for="last_name">Priimek</label>
                    <input type="text" id="last_name" name="last_name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email naslov</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Telefonska številka</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="form-group">
                    <label for="password">Geslo</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Potrdi geslo</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>

                <button type="submit" class="submit-btn">Registriraj se</button>

                <div class="login-link">
                    <p>Že imate račun? <a href="login.html">Prijavite se</a></p>
                </div>
            </form>
        </div>
    </div>
