        <nav class="topbar-nav">

            <button type="button" class="submit-btn" onclick="window.location.href='placilo.html'">

    <script>
        document.addEventListener('DOMContentLoaded', async() => {
            const user = await checkAuth();
            await updateAuthUI(user);
