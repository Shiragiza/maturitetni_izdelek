    <div class="login-container">
        <div class="login-form">
            <h2 class="form-title">Prijava</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email naslov</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Geslo</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="submit-btn">Prijavi se</button>

                <div class="register-link">
                    <p>Še nimate računa? <a href="registracija.html">Registrirajte se</a></p>
                </div>
                <div class="forgot-password">
                    <a href="pozabljeno-geslo.html">Pozabljeno geslo?</a>
                </div>
            </form>
        </div>
    </div>
