<!doctype html>
<html lang="sl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plačilo - Brivska Akademija</title>
    <link rel="stylesheet" href="CSS/base.css" />
    <link rel="stylesheet" href="CSS/layout.css" />
    <link rel="stylesheet" href="CSS/topbar.css" />
    <link rel="stylesheet" href="CSS/utilities.css" />
    <link rel="stylesheet" href="CSS/css_login_in_registracija.css" />
    <script src="https://js.stripe.com/v3/"></script>
</head>

<body>

    <aside class="sidebar" id="sidebar">
        <button class="menu-toggle"><img style="height: 36px;" src="SLIKE\SIDEBAR\menu_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png"></button>
        <div class="sidebar-content">
            <button class="sidebar-button" onclick="window.location.href='začetna_stran.html'"><img src="SLIKE\SIDEBAR\home_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png"> Home</button>
            <div class="sidebar-divider"></div>
            <button class="sidebar-button" onclick="window.location.href='Predavatelji.html'"><img src="SLIKE\SIDEBAR\person_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png"> Predavatelji</button>
            <div class="sidebar-divider"></div>
            <button class="sidebar-button" onclick="window.location.href='posnetki.html'"><img src="SLIKE\SIDEBAR\video_library_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png"> Posnetki</button>
            <div class="sidebar-divider"></div>
            <button class="sidebar-button" onclick="window.location.href='kontakti.html'"><img src="SLIKE\SIDEBAR\call_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png"> Kontakti</button>
        </div>
    </aside>
    <header class="topbar">
        <nav class="topbar-nav">
            <button class="topbar-button" onclick="window.location.href='začetna_stran.html'"><img style="height: 24px;" src="SLIKE\SIDEBAR\home_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Home"> Home</button>
            <button class="topbar-button" onclick="window.location.href='Predavatelji.html'"><img style="height: 24px;" src="SLIKE\SIDEBAR\person_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Predavatelji"> Predavatelji</button>
            <button class="topbar-button" onclick="window.location.href='posnetki.html'"><img style="height: 24px;" src="SLIKE\SIDEBAR\video_library_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Posnetki"> Posnetki</button>
            <button class="topbar-button" onclick="window.location.href='kontakti.html'"><img style="height: 24px;" src="SLIKE\SIDEBAR\call_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Kontakti"> Kontakti</button>
        </nav>
        <div class="topbar-auth" id="topbarAuth">
            <button class="register-btn" onclick="window.location.href='registracija.html'">Registracija</button>
            <button class="login-btn" onclick="window.location.href='login.html'">Login</button>
        </div>
    </header>

    <div class="login-container">
        <div class="login-form">
            <h2 class="form-title">Naročnina</h2>
            <p style="text-align: center; margin-bottom: 20px; color: #666;">
                Pridobite dostop do vseh video posnetkov in postanite profesionalni brivec!
            </p>

            <div style="text-align: center; margin: 30px 0;">
                <span style="font-size: 48px; font-weight: bold; color: #333;">€0.01</span>
                <span style="color: #666;"> / enkratno plačilo</span>
            </div>

            <ul style="text-align: left; margin: 20px 0; padding-left: 20px; color: #555;">
                <li style="margin: 10px 0;">✓ Dostop do vseh video posnetkov</li>
                <li style="margin: 10px 0;">✓ Brezčasno učenje</li>
                <li style="margin: 10px 0;">✓ Tehnike profesionalnega britja</li>
                <li style="margin: 10px 0;">✓ Nega brade in brkov</li>
                <li style="margin: 10px 0;">✓ Vzdrževanje orodij</li>
            </ul>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="button" id="stripeButton" class="submit-btn" style="flex: 1;">
                    Plačaj s Stripe
                </button>
                <button type="button" id="paypalButton" class="submit-btn" style="flex: 1; background-color: #003087;">
                    Plačaj s PayPal
                </button>
            </div>

            <div id="errorMessage" style="color: red; text-align: center; margin-top: 10px; display: none;"></div>
        </div>
    </div>

    <script src="JAVAScript/sidebar_and_topbar.js"></script>
    <script src="JAVAScript/JS_login_and_regictracija.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async() => {
            const user = await checkAuth();
            await updateAuthUI(user);

            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            if (user.has_access) {
                window.location.href = 'posnetki.html';
                return;
            }

            const stripeButton = document.getElementById('stripeButton');
            const paypalButton = document.getElementById('paypalButton');

            stripeButton.addEventListener('click', async() => {
                stripeButton.disabled = true;
                stripeButton.textContent = 'Nalaganje...';

                try {
                    const response = await fetch('http://localhost:3000/api/payment/create-checkout-session', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        credentials: 'include'
                    });

                    const result = await response.json();

                    if (result.error) {
                        document.getElementById('errorMessage').textContent = result.error;
                        document.getElementById('errorMessage').style.display = 'block';
                        stripeButton.disabled = false;
                        stripeButton.textContent = 'Plačaj s Stripe';
                    } else {
                        window.location.href = result.url;
                    }
                } catch (e) {
                    document.getElementById('errorMessage').textContent = 'Napaka pri komunikaciji s strežnikom';
                    document.getElementById('errorMessage').style.display = 'block';
                    stripeButton.disabled = false;
                    stripeButton.textContent = 'Plačaj s Stripe';
                }
            });

            paypalButton.addEventListener('click', async() => {
                paypalButton.disabled = true;
                paypalButton.textContent = 'Nalaganje...';

                try {
                    const response = await fetch('http://localhost:3000/api/payment/paypal/create-order', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        credentials: 'include'
                    });

                    const result = await response.json();

                    if (result.error) {
                        document.getElementById('errorMessage').textContent = result.error;
                        document.getElementById('errorMessage').style.display = 'block';
                        paypalButton.disabled = false;
                        paypalButton.textContent = 'Plačaj s PayPal';
                    } else {
                        window.location.href = result.url;
                    }
                } catch (e) {
                    document.getElementById('errorMessage').textContent = 'Napaka pri komunikaciji s strežnikom';
                    document.getElementById('errorMessage').style.display = 'block';
                    paypalButton.disabled = false;
                    paypalButton.textContent = 'Plačaj s PayPal';
                }
            });
        });
    </script>
</body>

</html>
