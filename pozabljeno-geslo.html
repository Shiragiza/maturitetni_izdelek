        <nav class="topbar-nav">

            <button class="topbar-button" onclick="window.location.href='Predavatelji.html'"><img style="height: 24px;" src="SLIKE/SIDEBAR/person_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.png" alt="Predavatelji"> Predavatelji</button>

        <div class="topbar-auth">
            <button class="register-btn" onclick="window.location.href='registracija.html'">Registracija</button>
            <button class="login-btn" onclick="window.location.href='login.html'">Login</button>
        </div>
    </header>

    <div class="registration-container">
        <div class="registration-form">
            <h2 class="form-title">Pozabljeno geslo</h2>
            <p style="text-align: center; margin-bottom: 20px; color: #666;">
                Vnesite svoj email naslov in poslali vam bomo povezavo za ponastavitev gesla.
            </p>
            <form id="forgotForm">
                <div class="form-group">
                    <label for="fp-email">Email</label>
                    <input type="email" id="fp-email" name="email" required>
                </div>
                <button type="submit" class="submit-btn">Pošlji povezavo</button>
            </form>

            <div id="resetStep" style="display:none; margin-top: 16px;">
                <div class="form-group">
                    <label for="fp-pass">Novo geslo</label>
                    <input type="password" id="fp-pass" required>
                </div>
                <div class="form-group">
                    <label for="fp-pass2">Potrdi novo geslo</label>
                    <input type="password" id="fp-pass2" required>
                </div>
                <button id="resetBtn" class="submit-btn" style="width:100%">Ponastavi geslo</button>
            </div>

            <div class="login-link" style="margin-top: 20px;">
                <p><a href="login.html">Nazaj na prijavo</a></p>
            </div>
        </div>
    </div>

                <p>Ljubljana 1000</p>
            </div>
        </div>
        <div class="footer-note">© Brivska Akademija</div>
    </footer>
