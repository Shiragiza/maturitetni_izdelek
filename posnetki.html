    <script>
        async function checkAccess() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    credentials: 'include'
                });
                const result = await response.json();

                if (!result.user) {
                    window.location.href = 'login.html';
                    return false;
                }

                if (result.user.has_access === 0 || result.user.has_access === false) {
                    alert('Za dostop do videoposnetkov kontaktirajte admina.');
                    window.location.href = 'začetna_stran.html';
                    return false;
                }

                return true;
            } catch (e) {
                window.location.href = 'login.html';
                return false;
            }
        }

        document.addEventListener('DOMContentLoaded', async() => {
            const hasAccess = await checkAccess();
            if (!hasAccess) return;

            const user = await checkAuth();
            await updateAuthUI(user);

            loadVideos();
        });

        async function loadVideos() {
            try {
                const response = await fetch(`${API_URL}/videos/public`, {
                    credentials: 'include'
                });
                const result = await response.json();

                if (result.error) {
                    document.getElementById('videoGallery').innerHTML = '<p style="text-align: center; color: red;">Napaka: ' + result.error + '</p>';
                    return;
                }

                const gallery = document.getElementById('videoGallery');

                if (!result.videos || result.videos.length === 0) {
                    gallery.innerHTML = '<p style="text-align: center;">Ni video posnetkov na voljo.</p>';
                    return;
                }

                gallery.innerHTML = result.videos.map(video => `
                    <article class="video-card">
                        <div class="video-wrapper">
                            <video controls preload="metadata" poster="${video.thumbnail_url || ''}">
                            <source src="${video.video_url}" type="video/mp4" />
                            Vaš brskalnik ne podpira videopredvajalnika.
                            </video>
                        </div>
                        <h3 class="video-title">${video.title}</h3>
                        ${video.description ? '<p style="padding: 10px; color: #666;">' + video.description + '</p>' : ''}
                    </article>
                `).join('');
            } catch (e) {
                console.error('Error loading videos:', e);
                document.getElementById('videoGallery').innerHTML = '<p style="text-align: center; color: red;">Napaka: ' + e.message + '</p>';
            }
        }
    </script>
