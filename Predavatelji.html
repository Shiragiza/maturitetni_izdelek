    <div class="topbar-auth">
        <button class="register-btn" onclick="window.location.href='registracija.html'">Registracija</button>
        <button class="login-btn" onclick="window.location.href='login.html'">Login</button>
    </div>
</header>
    <div class="auth-buttons">
        <button class="register-btn" onclick="window.location.href='registracija.html'">Registracija</button>
        <button class="login-btn" onclick="window.location.href='login.html'">Login</button>
    </div>

    <div class="div-light">
        <h1 class="h1-elegant">Naši Predavatelji</h1>
        <p>Seznam vseh naših kvalificiranih profesorjev</p>

        <!-- Responsive Cards Row -->
        <section class="cards-grid cards-container" aria-label="Predavatelji">
            <!-- Card 1 -->
            <article class="person-card" data-firstname="Luka" data-lastname="Oven" data-age="23" data-bio="Večletne izkušnje z natančnimi klasičnimi in modernimi pristriženji. Mentor novih generacij brivcev.">
                <button class="card-media card-trigger" aria-label="Odpri profil Luka Oven">
                    <img src="SLIKE/brivci/luka.jpg" alt="Luka Oven" loading="lazy" />
                    <div class="overlay">
                        <div class="overlay-content">
                            <h3 class="person-name">Luka Oven</h3>
                            <hr class="overlay-hr" />
                            <p class="person-desc">Mojster brivec</p>
                        </div>
                    </div>
                </button>
            </article>

            <!-- Card 2 -->
            <article class="person-card" data-firstname="Đorđe" data-lastname="Petrović" data-age="34" data-bio="Specialist za brade, oblikovanje in personalizirana nega. Ljubitelj detajlov in perfekcionist.">
                <button class="card-media card-trigger" aria-label="Odpri profil Đorđe Petrović">
                    <img src="SLIKE/brivci/djole.jpg" alt="ĐORĐE" loading="lazy" />
                    <div class="overlay">
                        <div class="overlay-content">
                            <h3 class="person-name">ĐORĐE</h3>
                            <hr class="overlay-hr" />
                            <p class="person-desc">Strokovnjak za nego brade in sodobne trende oblikovanja.</p>
                        </div>
                    </div>
                </button>
            </article>

            <!-- Card 3 -->
            <article class="person-card" data-firstname="Žan" data-lastname="Novak" data-age="27" data-bio="Predavatelj tehnik britja, higiene in vzdrževanja orodij. Poudarek na preciznosti in varnosti.">
                <button class="card-media card-trigger" aria-label="Odpri profil Žan Novak">
                    <img src="SLIKE/brivci/zan.jpg" alt="Žan" loading="lazy" />
                    <div class="overlay">
                        <div class="overlay-content">
                            <h3 class="person-name">Žan</h3>
                            <hr class="overlay-hr" />
                            <p class="person-desc">Predavatelj tehnik britja in vzdrževanja orodij v praksi.</p>
                        </div>
                    </div>
                </button>
            </article>

            <!-- Card 4  -->
            <article class="person-card" data-firstname="Mladen" data-lastname="Kovač" data-age="31" data-bio="Brivec sodobnega časa z občutkom za stil in prijaznim pristopom do strank.">
                <button class="card-media card-trigger" aria-label="Odpri profil Mladen Kovač">
                    <img src="SLIKE/brivci/mladen.jpg" alt="Mladen" loading="lazy" />
                    <div class="overlay">
                        <div class="overlay-content">
                            <h3 class="person-name">Mladen</h3>
                            <hr class="overlay-hr" />
                            <p class="person-desc">Brivec sodobnega časa.</p>
                        </div>
                    </div>
                </button>
            </article>
        </section>

        <!-- Expanded modal overlay and card -->
        <div class="card-overlay" hidden>
            <div class="card-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
                <button class="modal-close" aria-label="Zapri">×</button>
                <div class="flip-scene">
                    <div class="flip-card">
                        <div class="flip-face flip-front"></div>
                        <div class="flip-face flip-back">
                            <div class="modal-content">
                                <h2 id="modal-title" class="modal-name"></h2>
                                <hr class="modal-hr" />
                                <p class="modal-age"></p>
                                <hr class="modal-hr" />
                                <p class="modal-bio"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
